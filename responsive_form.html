<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <form onsubmit="submitform()" ; return false;>
        <h1>Responsive Form</h1>

        <label for="firstname">First Name:</label>
        <input type="text" id="firstname" placeholder="Enter your first name">
        <br>

        <!--in lagyan ko lng po ma'am try lng po HEHE-->
        <label for="lastname">Last Name:</label>
        <input type="text" id="lastname" placeholder="Enter your last name">
        <br>

        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="e.g beebyte@gmail.com">
        <br>

        <label for="bday">Birthday:</label>
        <input type="date" id="bday" placeholder="Enter your birthday">
        <br>

        <label for="address">Address:</label>
        <textarea id="address" placeholder="Enter your address"></textarea>
        <br>

        <label for="courses">Select Course:</label>
        <select id="courses">
            <option value="">>--Select your Course--<</option>
            <option value="BSIT">Bachelor of Science in Information Technology</option>
            <option value="BSIS">Bachelor of Science in Information Systems</option>
            <option value="BSCS">Bachelor of Science in Computer Science</option>
            <option value="BTVTED_CHS">Bachelor in Technical-Vocational Teacher Education (CHS)</option>
        </select>
        <br>

        <input type="submit" value="Submit">
    </form>

    <script>
        function submitform() {
            var firstname = document.getElementById("firstname").value;
            var lastname = document.getElementById("lastname").value;
            var email = document.getElementById("email").value;
            var bday = document.getElementById("bday").value;
            var address = document.getElementById("address").value;
            var courses = document.getElementById("courses").value;

            if (firstname === "" || lastname === "" || email === "" || bday === "" ||
                address === "" || courses === "") {
                alert("Please fill all the requirements in the form.");
                return false;
            } else {
                alert("Name: " + firstname + " " + lastname + "\nEmail: " + email + "\nbday: " + bday +
                    "\nAddress: " + address + "\nYour Course is " + courses + " nice, Good luck! ^^"
                );
                return true;
            }
        }
    </script>

</body>

</html>
